name: cixis fayli Links

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          pip install playwright requests

      - name: Install Playwright browsers
        run: |
          playwright install chromium

      - name: Run goals.py (kanallar klasörü ve playlist.m3u oluşturulur)
        run: python goals.py

      - name: Commit and Push to target repository
        run: |
          # 1. Hedef depo URL'sini PAT ile yapılandır
          TARGET_REPO_URL="https://GeceKod:${{ secrets.TARGET_REPO_TOKEN }}@github.com/GeceKod/listeler.git"
          TARGET_DIR="target_repo"

          # 2. Git yapılandırması
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions (M3U8 Pusher)"
          
          # 3. Hedef depoyu klonla
          echo "Hedef depo klonlanıyor..."
          git clone --depth 1 $TARGET_REPO_URL $TARGET_DIR
          
          # 4. Klonlanan depoya geç
          cd $TARGET_DIR
          
          # 5. Dosyaları kopyala (Eski kanallar klasörünü temizleyip yenisini koyuyoruz)
          echo "Yeni dosyalar kopyalanıyor..."
          rm -rf kanallar/
          cp ../playlist.m3u .
          cp -r ../kanallar .
          
          # 6. Tüm değişiklikleri Git'e ekle
          git add -A
          
          # 7. Eğer değişiklik varsa commit et
          if git diff --staged --quiet; then
            echo "Hedef depoda değişiklik yok, commit atlanıyor."
          else
            git commit -m "Kanal listeleri otomatik güncellendi: $(date -u)"
            
            # 8. Değişiklikleri hedef depoya push et
            echo "Değişiklikler push ediliyor..."
            git push
            echo "Push işlemi tamamlandı."
          fi
